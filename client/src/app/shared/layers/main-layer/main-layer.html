<mat-drawer-container autosize class="min-h-full">
  <mat-drawer
    #drawer
    class="2xl:!w-1/6 lg:!w-1/3 !w-3/4 !bg-background-600"
    [mode]="isCompactLayout() ? 'over' : 'side'">
    <app-ui-nav [drawer]="drawer" [isCompactLayout]="isCompactLayout()" />
  </mat-drawer>
  <mat-drawer-content>
    @if (isCompactLayout()) {
      <app-ui-header [drawer]="drawer" />
    }
    <app-ui-content><router-outlet /></app-ui-content>
  </mat-drawer-content>
</mat-drawer-container>
