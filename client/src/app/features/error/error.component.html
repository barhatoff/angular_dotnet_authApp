<div class="m-auto text-center flex flex-col">
  <h1>Ooooooops!</h1>
  <h2 class="text-error">Error {{ appError?.code }}</h2>
  <div>
    <h3>{{ appError?.message }}</h3>
    @if (appError?.instructions) {
      <p>
        @if (appError?.linkTo) {
          <a [href]="appError?.linkTo">{{ appError?.instructions }}</a>
        } @else {
          <span>{{ appError?.instructions }}</span>
        }
      </p>
    }
  </div>
</div>
